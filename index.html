<html lang="en">

<style>
  :root {
    --bg: #0b1020;
    --panel: #11172b;
    --panel-2: #161d36;
    --border: #232c4d;
    --text: #e6ebff;
    --muted: #8a93b8;
    --accent: #6366f1;
    --accent-2: #22d3ee;
    --good: #10b981;
    --bad: #ef4444;
    --warn: #f59e0b;
  }
  html, body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, -apple-system, sans-serif; }
  .panel { background: var(--panel); border: 1px solid var(--border); }
  .panel-2 { background: var(--panel-2); border: 1px solid var(--border); }
  .nav-item { display:flex; align-items:center; gap:.6rem; padding:.6rem .8rem; border-radius:.55rem; color:var(--muted); cursor:pointer; transition:all .15s; font-weight:500; font-size:.92rem; }
  .nav-item:hover { background: rgba(99,102,241,.1); color: var(--text); }
  .nav-item.active { background: linear-gradient(135deg, rgba(99,102,241,.22), rgba(34,211,238,.12)); color: white; }
  .nav-item .ico { width:18px; height:18px; }
  .stat-card { background: linear-gradient(135deg, var(--panel) 0%, var(--panel-2) 100%); border:1px solid var(--border); border-radius:.85rem; padding:1.1rem 1.2rem; }
  .pill { display:inline-block; padding:.18rem .55rem; border-radius:999px; font-size:.72rem; font-weight:600; letter-spacing:.02em; }
  .pill-stock { background: rgba(99,102,241,.18); color:#a5b4fc; }
  .pill-listed { background: rgba(245,158,11,.18); color:#fbbf24; }
  .pill-sold { background: rgba(16,185,129,.18); color:#34d399; }
  .pill-bstock { background: rgba(34,211,238,.15); color:#67e8f9; }
  .pill-triangle { background: rgba(244,114,182,.15); color:#f9a8d4; }
  .pill-pay { background: rgba(34,197,94,.12); color:#86efac; font-size:.65rem; }
  .btn { display:inline-flex; align-items:center; gap:.4rem; padding:.5rem .9rem; border-radius:.55rem; font-weight:600; font-size:.88rem; cursor:pointer; transition:all .15s; border:1px solid transparent; }
  .btn-primary { background: linear-gradient(135deg, #6366f1, #4f46e5); color:white; }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(99,102,241,.35); }
  .btn-ghost { background: transparent; border-color: var(--border); color:var(--text); }
  .btn-ghost:hover { background: var(--panel-2); }
  .btn-danger { background: rgba(239,68,68,.12); color:#fca5a5; border-color: rgba(239,68,68,.3); }
  .btn-danger:hover { background: rgba(239,68,68,.22); }
  .input, .select, textarea.input { background: var(--panel-2); border:1px solid var(--border); border-radius:.5rem; padding:.5rem .7rem; color:var(--text); font-size:.9rem; width:100%; }
  .input:focus, .select:focus, textarea.input:focus { outline:none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(99,102,241,.18); }
  table.data { width:100%; border-collapse: collapse; font-size:.88rem; }
  table.data th { text-align:left; font-weight:600; color:var(--muted); padding:.7rem .8rem; border-bottom:1px solid var(--border); font-size:.78rem; text-transform:uppercase; letter-spacing:.04em; }
  table.data td { padding:.75rem .8rem; border-bottom:1px solid rgba(35,44,77,.6); vertical-align: middle; }
  table.data tr:hover td { background: rgba(99,102,241,.04); }
  .dropzone { border: 2px dashed var(--border); border-radius: .85rem; padding: 2.2rem; text-align:center; transition:all .2s; cursor:pointer; }
  .dropzone:hover, .dropzone.drag { border-color: var(--accent); background: rgba(99,102,241,.06); }
  .modal-bg { position:fixed; inset:0; background:rgba(2,6,23,.7); backdrop-filter: blur(4px); z-index:50; display:flex; align-items:center; justify-content:center; padding:1rem; }
  .modal { background: var(--panel); border:1px solid var(--border); border-radius:.85rem; max-width:560px; width:100%; max-height:90vh; overflow-y:auto; }
  .toast { background: var(--panel); border:1px solid var(--border); border-left:3px solid var(--accent); padding:.7rem 1rem; border-radius:.5rem; box-shadow: 0 12px 30px rgba(0,0,0,.4); animation: slideIn .25s ease-out; }
  .toast.good { border-left-color: var(--good); }
  .toast.bad { border-left-color: var(--bad); }
  @keyframes slideIn { from { transform: translateX(20px); opacity:0; } to { transform: translateX(0); opacity:1; } }
  .scrollbar::-webkit-scrollbar { width:8px; height:8px; }
  .scrollbar::-webkit-scrollbar-thumb { background: var(--border); border-radius:4px; }
  .scrollbar::-webkit-scrollbar-track { background: transparent; }
  .text-muted { color: var(--muted); }
  .text-good { color: #34d399; }
  .text-bad { color: #fca5a5; }
  .progress { height:6px; background: var(--panel-2); border-radius: 3px; overflow:hidden; }
  .progress > div { height:100%; background: linear-gradient(90deg, var(--accent), var(--accent-2)); }
</style>
</head>
<body class="min-h-screen">

<div id="app" class="flex min-h-screen">
  <!-- Sidebar -->
  <aside class="w-60 panel border-r flex-shrink-0 flex flex-col">
    <div class="px-5 py-5 border-b border-[var(--border)]">
      <div class="flex items-center gap-2.5">
        <div class="w-9 h-9 rounded-lg bg-gradient-to-br from-indigo-500 to-cyan-400 flex items-center justify-center font-bold text-white">L</div>
        <div>
          <div class="font-bold leading-tight">Liquidation</div>
          <div class="text-xs text-muted leading-tight">Tracker</div>
        </div>
      </div>
    </div>
    <nav class="flex-1 p-3 space-y-1" id="nav"></nav>
    <div class="p-3 border-t border-[var(--border)] text-xs text-muted">
      <div id="storageInfo">—</div>
    </div>
  </aside>

  <!-- Main -->
  <main class="flex-1 flex flex-col min-w-0">
    <header class="panel border-b px-7 py-4 flex items-center justify-between">
      <div>
        <h1 id="pageTitle" class="text-xl font-bold">Dashboard</h1>
        <p id="pageSub" class="text-sm text-muted">Overview of your side hustle</p>
      </div>
      <div class="flex items-center gap-2">
        <button class="btn btn-ghost" onclick="exportData()">Export</button>
        <button class="btn btn-primary" onclick="navigate('import')">+ Import Files</button>
      </div>
    </header>
    <div id="page" class="flex-1 overflow-y-auto scrollbar p-7"></div>
  </main>
</div>

<div id="modalRoot"></div>
<div id="toastRoot" class="fixed top-4 right-4 z-[60] space-y-2"></div>

<script>
/* ============================================================
   STATE & PERSISTENCE
   ============================================================ */
const STORAGE_KEY = 'liquidation_tracker_v1';
const state = {
  lots: [],     // {id, source, orderNumber, date, subtotal, fees, shipping, tax, total, description, origin, notes, raw}
  items: [],    // {id, lotId, sku, description, qty, unitRetail, extRetail, allocatedCost, status, salePrice, saleDate, saleFees, shippingOut, notes, model, vendor, category, condition, itemNumber}
  ui: { route: 'dashboard', filter: 'all', selectedLot: null }
};

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }
function save() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ lots: state.lots, items: state.items }));
    updateStorageInfo();
  } catch(e) { toast('Could not save: ' + e.message, 'bad'); }
}
function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const data = JSON.parse(raw);
      state.lots = data.lots || [];
      state.items = data.items || [];
    }
  } catch(e) { console.error(e); }
}
function updateStorageInfo() {
  const el = document.getElementById('storageInfo');
  if (!el) return;
  const n = state.items.length, l = state.lots.length;
  el.textContent = `${l} lot${l!==1?'s':''} · ${n} item${n!==1?'s':''}`;
}

/* ============================================================
   UTILITIES
   ============================================================ */
const fmt = {
  money: (n) => (n==null||isNaN(n)) ? '—' : '$' + Number(n).toLocaleString('en-US', { minimumFractionDigits:2, maximumFractionDigits:2 }),
  pct: (n) => (n==null||isNaN(n)) ? '—' : (n>=0?'+':'') + (n*100).toFixed(1) + '%',
  date: (d) => d ? new Date(d).toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' }) : '—',
  num: (n) => Number(n||0).toLocaleString('en-US')
};

function escapeHtml(s) {
  return String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function toast(msg, kind='') {
  const root = document.getElementById('toastRoot');
  const el = document.createElement('div');
  el.className = 'toast ' + kind;
  el.textContent = msg;
  root.appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transition='opacity .3s'; setTimeout(()=>el.remove(), 300); }, 3500);
}

function modal(html) {
  const root = document.getElementById('modalRoot');
  root.innerHTML = `<div class="modal-bg" onclick="if(event.target===this) closeModal()"><div class="modal panel">${html}</div></div>`;
}
function closeModal() { document.getElementById('modalRoot').innerHTML = ''; }

/* ============================================================
   COST ALLOCATION
   Splits a lot's total cost across its items proportionally
   to extRetail (the user's chosen method).
   ============================================================ */
function allocateLotCosts(lotId) {
  const lot = state.lots.find(l => l.id === lotId);
  if (!lot) return;
  const items = state.items.filter(i => i.lotId === lotId);
  if (items.length === 0) return;

  const totalCost = Number(lot.total) || 0;
  const totalRetail = items.reduce((s,i) => s + (Number(i.extRetail)||0), 0);

  if (totalRetail > 0) {
    items.forEach(it => {
      const share = (Number(it.extRetail)||0) / totalRetail;
      it.allocatedCost = +(totalCost * share).toFixed(2);
    });
  } else {
    // Fall back to equal split by qty
    const totalQty = items.reduce((s,i) => s + (Number(i.qty)||1), 0) || items.length;
    items.forEach(it => {
      const share = (Number(it.qty)||1) / totalQty;
      it.allocatedCost = +(totalCost * share).toFixed(2);
    });
  }
}

function recalcAllAllocations() {
  state.lots.forEach(l => allocateLotCosts(l.id));
}

/* ============================================================
   BUYER PREMIUM DETECTION
   On Triangle receipts, each won item is followed by a "BP01"
   line ~15% of the item's price. These are buyer's premium fees
   on the item, not separate items. We merge them into the prior
   item's extRetail so allocation includes them.
   ============================================================ */
function isBuyerPremiumSku(sku) {
  if (!sku) return false;
  // Tolerant of OCR misreads: BPOL = BP01 (O→0, L→1), BPO1, BP0I, BPLI, etc.
  // Also matches plain BP, BP01, BP02 ... and PREMIUM / FEE keywords.
  const s = String(sku).trim().toUpperCase();
  return /^BP[0-9OIL]{0,4}$|^PREMIUM$|^FEE$/.test(s);
}

// Given an array of {sku, qty, unitRetail, extRetail, note?, description?}
// merge any BP-style line into the previous item as buyerPremium.
// Returns a new array.
function collapseBuyerPremium(items) {
  const out = [];
  for (const it of items) {
    const prev = out[out.length - 1];
    if (prev && !isBuyerPremiumSku(prev.sku) && isBuyerPremiumSku(it.sku)) {
      // Sanity-check: BP should be 5-25% of prior item's price
      const ratio = (it.extRetail || 0) / (prev.extRetail || 1);
      if (ratio >= 0.04 && ratio <= 0.30) {
        prev.buyerPremium = +(it.extRetail || 0).toFixed(2);
        prev.extRetail = +((prev.extRetail || 0) + (it.extRetail || 0)).toFixed(2);
        continue;
      }
    }
    out.push({ ...it, buyerPremium: it.buyerPremium || 0 });
  }
  return out;
}

/* ============================================================
   FILE PARSERS
   ============================================================ */

// Setup PDF.js worker
if (window.pdfjsLib) {
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
}

async function extractPdfData(file) {
  const buf = await file.arrayBuffer();
  // Keep a copy because pdf.js will neuter the buffer
  const bufCopy = buf.slice(0);
  const pdf = await pdfjsLib.getDocument({ data: bufCopy }).promise;

  // 1) Text from each page, sorted by line
  let lines = [];
  for (let p = 1; p <= pdf.numPages; p++) {
    const page = await pdf.getPage(p);
    const content = await page.getTextContent();
    const byY = new Map();
    content.items.forEach(it => {
      const y = Math.round(it.transform[5]);
      if (!byY.has(y)) byY.set(y, []);
      byY.get(y).push({ x: it.transform[4], s: it.str });
    });
    const sortedY = [...byY.keys()].sort((a,b)=>b-a);
    sortedY.forEach(y => {
      const row = byY.get(y).sort((a,b)=>a.x-b.x).map(o=>o.s).join(' ').replace(/\s+/g,' ').trim();
      if (row) lines.push(row);
    });
  }

  // 2) AcroForm fields (B-Stock invoices put values here)
  let fields = {};
  try {
    const fos = await pdf.getFieldObjects();
    if (fos) {
      Object.entries(fos).forEach(([name, arr]) => {
        const v = (arr && arr[0]) ? (arr[0].value ?? arr[0].defaultValue) : null;
        if (v != null && v !== '') fields[name] = v;
      });
    }
  } catch(e) { /* PDF has no form */ }

  return { lines, text: lines.join('\n'), fields, pdf, file };
}

async function renderPdfPageToDataUrl(pdf, pageNum=1, scale=1.5) {
  const page = await pdf.getPage(pageNum);
  const viewport = page.getViewport({ scale });
  const canvas = document.createElement('canvas');
  canvas.width = viewport.width; canvas.height = viewport.height;
  const ctx = canvas.getContext('2d');
  await page.render({ canvasContext: ctx, viewport }).promise;
  return canvas.toDataURL('image/png');
}

function parseMoney(s) {
  if (!s) return null;
  const m = String(s).replace(/[^0-9.\-]/g, '');
  return m ? parseFloat(m) : null;
}

/* ---------- B-Stock Invoice (PDF) ---------- */
function parseBStockInvoice(parsed) {
  const f = parsed.fields || {};
  const text = parsed.text;
  const out = { source: 'B-Stock', subtotal: null, fees: 0, shipping: 0, tax: 0, total: null, orderNumber: null, date: null, description: '', origin: '', lotIds: [] };

  // Prefer AcroForm fields (B-Stock invoices store all values here)
  out.orderNumber = f['Order Number'] || f['Entity Id'] || null;
  if (f['Formatted Date']) out.date = String(f['Formatted Date']).slice(0,10);
  out.subtotal = parseMoney(f['Amount']);
  out.fees = parseMoney(f['B-Stock Fee']) || 0;
  out.shipping = parseMoney(f['Shipping Charge']) || 0;
  out.total = parseMoney(f['Order Total']);
  out.description = f['Details'] || '';
  out.origin = f['Seller Company'] || '';

  // Fallback: regex over visible text if fields are missing
  if (!out.orderNumber) {
    const m = text.match(/ORDER\s*#?:?\s*([A-Z0-9\-]+)/i) || text.match(/Invoice\s*No\.?\s*([A-Z0-9\-]+)/i);
    if (m) out.orderNumber = m[1];
  }
  if (out.subtotal == null) {
    const m = text.match(/SUBTOTAL[^$0-9\-]*\$?\s*([\d,]+\.\d{2})/i); if (m) out.subtotal = parseMoney(m[1]);
  }
  if (!out.fees) {
    const m = text.match(/B-?Stock Fee[^$0-9\-]*\$?\s*([\d,]+\.\d{2})/i); if (m) out.fees = parseMoney(m[1]);
  }
  if (!out.shipping) {
    const m = text.match(/(?:Total\s*)?Shipping(?:\s*Amount|\s*Charge)?[^$0-9\-]*\$?\s*([\d,]+\.\d{2})/i); if (m) out.shipping = parseMoney(m[1]);
  }
  if (out.total == null) {
    const m = text.match(/Order\s*Total[^$0-9\-]*\$?\s*([\d,]+\.\d{2})/i); if (m) out.total = parseMoney(m[1]);
  }
  if (out.total == null) out.total = (out.subtotal||0) + (out.fees||0) + (out.shipping||0) + (out.tax||0);
  // If subtotal missing but we have total, derive it from total - fees - shipping - tax
  if (out.subtotal == null && out.total != null) {
    out.subtotal = +(out.total - (out.fees||0) - (out.shipping||0) - (out.tax||0)).toFixed(2);
  }

  if (!out.description) {
    const desc = parsed.lines.find(l => /Pallet|Lot|Units|Ext\.\s*Retail/i.test(l) && !/SUBTOTAL|B-Stock|Shipping|Order Total/i.test(l));
    if (desc) out.description = desc.replace(/\$\s*[\d,]+\.\d{2}/, '').trim();
  }

  // Extract lot ID like ROM-6691395 or 6691395 from description
  if (out.description) {
    const lotMatches = [...out.description.matchAll(/([A-Z]{2,4}-\d{5,})|\b(\d{6,})\b/g)];
    lotMatches.forEach(m => {
      const raw = (m[1]||m[2]||'');
      const numeric = raw.replace(/[A-Z\-]/gi, '');
      if (numeric) out.lotIds.push(numeric);
    });
  }

  return out;
}

/* ---------- Triangle Liquidators Receipt / Invoice (PDF) ---------- */
// Handles three text-native layouts that come out of PDF.js:
//   A) Receipt single-line:  "1 SKU: 14406752 @ $19.00 $19.00"  + optional "Note: ..."
//   B) Receipt two-line:     "SKU: 14406733" / "1 @ $19.00 $19.00" / "Note: ..."
//   C) Invoice format:       "(14406733) $70 Description text $19.00"
//                            "Buyers Premium (15%) $2.85"
//                            (description may wrap onto continuation lines, with
//                             price on its own line at the end)
function parseTriangleReceipt(parsed) {
  const lines = parsed.lines;
  const out = {
    source: 'Triangle', items: [],
    subtotal: null, tax: 0, total: null, fees: 0, cardFeeRate: null,
    orderNumber: null, date: null, taxRate: null
  };

  // Receipt # / Invoice #  (e.g. "Receipt / Tax Invoice #37777")
  const recM = parsed.text.match(/(?:Receipt|Invoice)\s*\/?\s*(?:Tax\s*Invoice)?\s*#\s*(\d{3,})/i);
  if (recM) out.orderNumber = '#' + recM[1];

  // Date — accepts "5 May 2026" OR "May 2, 2026" (Issued on:)
  const dateA = parsed.text.match(/(\d{1,2}\s+(?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)[a-z]*\s+\d{4})/i);
  const dateB = parsed.text.match(/(?:Issued\s*on:?\s*)?((?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)[a-z]*\s+\d{1,2},\s+\d{4})/i);
  const dateStr = (dateA && dateA[1]) || (dateB && dateB[1]);
  if (dateStr) {
    const d = new Date(dateStr);
    if (!isNaN(d)) out.date = d.toISOString().slice(0,10);
  }

  const SINGLE_LINE = /^(\d+)\s+SKU:\s*([A-Z0-9\-]+)\s*@\s*\$\s*([\d,]+\.\d{2})\s*\$\s*([\d,]+\.\d{2})\s*$/i;
  const SKU_HEAD    = /^SKU:\s*([A-Z0-9\-]+)\s*$/i;
  const QTY_LINE    = /^(\d+)\s*@\s*\$\s*([\d,]+\.\d{2})(?:\s*\$\s*([\d,]+\.\d{2}))?\s*$/;
  const NOTE_LINE   = /^Note:\s*(.+)$/i;
  // Invoice line — full or head-only
  const INV_FULL    = /^\((\d{4,})\)\s+(.+?)\s+\$([\d,]+\.\d{2})\s*$/;
  const INV_HEAD    = /^\((\d{4,})\)\s+(.+?)\s*$/;
  const PRICE_ONLY  = /^\$([\d,]+\.\d{2})\s*$/;
  const BP_LINE     = /^Buyer'?s?\s*Premium\s*\(?(\d+(?:\.\d+)?)?%?\)?\s*:?\s*\$?([\d,]+\.\d{2})\s*$/i;
  const STOP_LINE   = /^(Subtotal|Tax|TOTAL|Buyer'?s?\s*Premium|Issued|Due\s*date|Description|Amount)\b/i;

  let i = 0;
  let lastItem = null;
  while (i < lines.length) {
    const line = lines[i];

    // Buyer's Premium line — attach BP to the previous item
    const bp = line.match(BP_LINE);
    if (bp && lastItem) {
      const bpAmt = parseMoney(bp[2]);
      const ratio = bpAmt / (lastItem.unit || 1);
      // Sanity-check: BP should be 4-30% of the item price
      if (ratio >= 0.04 && ratio <= 0.30) {
        lastItem.buyerPremium = +((lastItem.buyerPremium || 0) + bpAmt).toFixed(2);
        lastItem.ext = +((lastItem.unit || 0) + lastItem.buyerPremium).toFixed(2);
        i++;
        continue;
      }
    }

    // Layout C — Invoice item with full info on one line
    const ifM = line.match(INV_FULL);
    if (ifM) {
      const desc = ifM[2].replace(/\s+/g,' ').trim();
      const price = parseMoney(ifM[3]);
      const item = { sku: ifM[1], qty: 1, unit: price, ext: price, note: desc, buyerPremium: 0 };
      out.items.push(item);
      lastItem = item;
      i++;
      continue;
    }

    // Layout C — Invoice item with description that wraps onto continuation lines
    const ihM = line.match(INV_HEAD);
    if (ihM) {
      let desc = ihM[2];
      let j = i + 1;
      let price = null;
      while (j < lines.length) {
        const next = lines[j];
        const pM = next.match(PRICE_ONLY);
        if (pM) { price = parseMoney(pM[1]); j++; break; }
        if (STOP_LINE.test(next) || INV_HEAD.test(next) || BP_LINE.test(next)) break;
        desc += ' ' + next.trim();
        j++;
      }
      if (price !== null) {
        desc = desc.replace(/\s+/g,' ').trim();
        const item = { sku: ihM[1], qty: 1, unit: price, ext: price, note: desc, buyerPremium: 0 };
        out.items.push(item);
        lastItem = item;
        i = j;
        continue;
      }
    }

    // Layout A — "1 SKU: 14406752 @ $19.00 $19.00"
    const sl = line.match(SINGLE_LINE);
    if (sl) {
      const qty = parseInt(sl[1],10) || 1;
      const unit = parseMoney(sl[3]);
      const ext = parseMoney(sl[4]) || unit * qty;
      let note = '';
      const next = lines[i+1] || '';
      const nm = next.match(NOTE_LINE);
      if (nm) { note = nm[1].trim(); i++; }
      const item = { sku: sl[2], qty, unit, ext, note, buyerPremium: 0 };
      out.items.push(item);
      lastItem = item;
      i++;
      continue;
    }

    // Layout B — "SKU: ..." / "1 @ $X $Y"
    const sk = line.match(SKU_HEAD);
    if (sk) {
      const qm = (lines[i+1] || '').match(QTY_LINE);
      if (qm) {
        const qty = parseInt(qm[1],10) || 1;
        const unit = parseMoney(qm[2]);
        const ext = (qm[3] && parseMoney(qm[3])) || unit * qty;
        let note = '';
        const nl = lines[i+2] || '';
        const nm = nl.match(NOTE_LINE);
        if (nm) { note = nm[1].trim(); i++; }
        const item = { sku: sk[1], qty, unit, ext, note, buyerPremium: 0 };
        out.items.push(item);
        lastItem = item;
        i += 2;
        continue;
      }
    }
    i++;
  }

  // Subtotal
  const sub = parsed.text.match(/Subtotal[^$0-9]*\$?\s*([\d,]+\.\d{2})/i);
  if (sub) out.subtotal = parseMoney(sub[1]);

  // NC Sales Tax (specific) — e.g. "NC Sales Tax (7.249%) $5.29"
  const ncTax = parsed.text.match(/NC\s*Sales\s*Tax[^%$]*?([\d.]+)\s*%[^$0-9]*\$?\s*([\d,]+\.\d{2})/i);
  if (ncTax) {
    out.taxRate = parseFloat(ncTax[1]) / 100;
    out.tax = parseMoney(ncTax[2]);
  } else {
    // Fallback: any "X% ... $Y" tax line, or generic Total Tax amount
    const taxRate = parsed.text.match(/(?:Sales\s*)?Tax[^%$]*?([\d.]+)\s*%[^$0-9]*\$?\s*([\d,]+\.\d{2})/i);
    const taxAmt  = !taxRate && parsed.text.match(/Total\s*Tax[^$0-9]*\$?\s*([\d,]+\.\d{2})/i);
    if (taxRate) { out.taxRate = parseFloat(taxRate[1]) / 100; out.tax = parseMoney(taxRate[2]); }
    else if (taxAmt) { out.tax = parseMoney(taxAmt[1]); }
  }

  // Card Fee (separate fee, not tax) — e.g. "Card Fee (3%) $2.19"
  const cardFee = parsed.text.match(/Card\s*Fee[^%$]*?([\d.]+)\s*%[^$0-9]*\$?\s*([\d,]+\.\d{2})/i)
              || parsed.text.match(/Card\s*Fee[^$0-9]*\$?\s*([\d,]+\.\d{2})/i);
  if (cardFee) {
    if (cardFee.length === 3) { out.cardFeeRate = parseFloat(cardFee[1]) / 100; out.fees = parseMoney(cardFee[2]); }
    else { out.fees = parseMoney(cardFee[1]); }
  }

  // Total — accept "TOTAL 8 items $91.43" / "TOTAL (8 items) $91.43" / "TOTAL $91.43"
  // and skip "Total Tax" / "Subtotal".
  const totalMatches = [...parsed.text.matchAll(/([A-Za-z ]{0,12}TOTAL[A-Za-z ]{0,12})[^\n$]*\$\s*([\d,]+\.\d{2})/gi)];
  for (let i = totalMatches.length - 1; i >= 0; i--) {
    const label = totalMatches[i][1].toUpperCase();
    if (/SUB\s*TOTAL/.test(label)) continue;
    if (/TOTAL\s*TAX/.test(label)) continue;
    out.total = parseMoney(totalMatches[i][2]);
    break;
  }
  if (out.total == null) out.total = (out.subtotal || 0) + (out.tax || 0) + (out.fees || 0);

  // Merge BP01-style buyer premium lines into prior items
  out.items = collapseBuyerPremium(out.items.map(it => ({ ...it, extRetail: it.ext })));

  return out;
}

/* ---------- B-Stock Manifest (CSV) ---------- */
function parseBStockManifest(csvText) {
  const result = Papa.parse(csvText.trim(), { header: true, skipEmptyLines: true });
  const items = [];
  const lotIdSet = new Set();
  result.data.forEach(row => {
    // Normalize keys
    const keys = Object.keys(row);
    const get = (cands) => {
      for (const c of cands) {
        const k = keys.find(kk => kk.toLowerCase().replace(/[^a-z0-9]/g,'') === c.toLowerCase().replace(/[^a-z0-9]/g,''));
        if (k) return row[k];
      }
      return '';
    };
    const lotId = get(['Lot ID','LotID','Lot']);
    if (lotId) lotIdSet.add(String(lotId).trim());
    const qty = parseInt(get(['Qty','Quantity'])||'1',10);
    const unitRetail = parseMoney(get(['Unit Retail','UnitRetail']));
    const extRetail = parseMoney(get(['Ext. Retail','Ext Retail','ExtRetail','Extended Retail']));
    items.push({
      itemNumber: get(['Item #','Item Number','SKU']),
      description: get(['Item Description','Description']),
      qty: qty || 1,
      unitRetail: unitRetail || 0,
      extRetail: extRetail || (unitRetail||0) * (qty||1),
      model: get(['Model']),
      vendor: get(['Vendor']),
      category: get(['Category','Seller Category','Department']),
      condition: get(['Condition'])
    });
  });
  return { items, lotIds: [...lotIdSet] };
}

/* ============================================================
   IMPORT ORCHESTRATION
   ============================================================ */
async function handleFile(file) {
  const name = file.name.toLowerCase();
  try {
    if (name.endsWith('.csv')) {
      const text = await file.text();
      const parsed = parseBStockManifest(text);
      return importBStockManifest(parsed, file.name);
    } else if (name.endsWith('.pdf')) {
      const parsed = await extractPdfData(file);
      const text = parsed.text;
      const fields = parsed.fields || {};

      // Detect type:
      const isBStock = /B-?Stock|PRO FORMA INVOICE|Order Total/i.test(text)
                    || Object.keys(fields).some(k => /B-?Stock|Order Total|Order Number/i.test(k));
      const isTriangle = /Triangle\s*Liquidators|NC Sales Tax|Tax Invoice/i.test(text)
                      || /^TLR_/i.test(file.name);
      // Image-based PDFs (Triangle scans) usually have very little extractable text:
      const lowText = text.replace(/\s+/g,'').length < 80 && Object.keys(fields).length === 0;

      if (isBStock && !lowText) {
        const bs = parseBStockInvoice(parsed);
        return importBStockInvoice(bs, file.name);
      }
      if (isTriangle || (lowText && /receipt|TLR/i.test(file.name))) {
        // Triangle is typically image-only — try parser, but most likely fall back to manual modal
        const tl = parseTriangleReceipt(parsed);
        if (tl.items.length > 0 && tl.total) {
          return importTriangleReceipt(tl, file.name);
        }
        return openManualReceiptModal(parsed, file.name, 'Triangle');
      }
      if (lowText) {
        return openManualReceiptModal(parsed, file.name, 'Other');
      }
      // Last-resort: try B-Stock parser
      const bs = parseBStockInvoice(parsed);
      if (bs.total) return importBStockInvoice(bs, file.name);
      return openManualReceiptModal(parsed, file.name, 'Other');
    } else {
      toast('Unsupported file: ' + file.name, 'bad');
    }
  } catch(e) {
    console.error(e);
    toast('Error parsing ' + file.name + ': ' + e.message, 'bad');
  }
}

/* Accepts two formats and returns an array of items.
   Triangle-style block:
     SKU: 14406733
     1 @ $19.00      $19.00
     Note: Lanscape 150 ft hose
   Pipe-style one-line:
     14406733 | Lanscape 150 ft hose | 1 | 19.00
*/
function parseManualItemsText(raw) {
  if (!raw || !raw.trim()) return [];
  const items = [];
  const lines = raw.split(/\r?\n/).map(l => l.trim()).filter(Boolean);

  // Detect Triangle-style if any line starts with "SKU:"
  const hasSkuLines = lines.some(l => /^SKU:\s*/i.test(l));

  if (hasSkuLines) {
    let cur = null;
    for (let i = 0; i < lines.length; i++) {
      const line = lines[i];
      const skuM = line.match(/^SKU:\s*([A-Z0-9\-]+)\s*$/i);
      if (skuM) {
        if (cur) items.push(cur);
        cur = { sku: skuM[1], description: '', qty: 1, unitRetail: 0, extRetail: 0, note: '' };
        continue;
      }
      // qty @ price [extended]
      const qm = line.match(/^(\d+)\s*@\s*\$?\s*([\d,]+\.?\d*)(?:\s*\$?\s*([\d,]+\.?\d*))?/);
      if (qm && cur) {
        cur.qty = parseInt(qm[1],10) || 1;
        cur.unitRetail = parseFloat(qm[2].replace(/,/g,'')) || 0;
        cur.extRetail = qm[3] ? parseFloat(qm[3].replace(/,/g,'')) : (cur.unitRetail * cur.qty);
        continue;
      }
      const noteM = line.match(/^Note:\s*(.+)$/i);
      if (noteM && cur) {
        cur.note = noteM[1].trim();
        // Use note as description (more readable than just the SKU)
        cur.description = cur.note;
        continue;
      }
      // Anything else attached to the current item gets appended to description
    }
    if (cur) items.push(cur);
    // Default description for items without a note
    items.forEach(it => { if (!it.description) it.description = `SKU ${it.sku}`; });
    return collapseBuyerPremium(items);
  }

  // Pipe-style: SKU | description | qty | price
  lines.forEach(line => {
    const parts = line.split('|').map(s => s.trim());
    const [sku, desc, qty, price] = parts;
    const q = parseInt(qty)||1;
    const p = parseFloat(price)||0;
    items.push({ sku: sku||'', description: desc||sku||'Item', qty: q, unitRetail: p, extRetail: p*q, note: '' });
  });
  return items;
}

function saveManualReceipt(filename) {
  const src = document.getElementById('mr_src').value;
  const date = document.getElementById('mr_date').value;
  const order = document.getElementById('mr_order').value;
  const sub = parseFloat(document.getElementById('mr_sub').value)||0;
  const tax = parseFloat(document.getElementById('mr_tax').value)||0;
  const total = parseFloat(document.getElementById('mr_total').value) || (sub + tax);
  const itemsText = document.getElementById('mr_items').value.trim();
  const items = parseManualItemsText(itemsText);

  if (items.length === 0 && total === 0) {
    toast('Add some items or a total', 'bad'); return;
  }

  const lot = {
    id: uid(), source: src, orderNumber: order, date,
    subtotal: sub, fees: 0, shipping: 0, tax,
    total: total || sub + tax,
    description: src==='Triangle' ? 'Triangle Liquidators receipt' : (src==='B-Stock' ? 'B-Stock invoice' : 'Manual lot'),
    origin: src==='Triangle' ? 'Triangle Liquidators' : '',
    notes: 'Manually entered from: ' + filename
  };
  state.lots.push(lot);
  items.forEach(it => {
    state.items.push({
      id: uid(), lotId: lot.id, sku: it.sku, itemNumber: it.sku, description: it.description,
      qty: it.qty, unitRetail: it.unitRetail, buyerPremium: it.buyerPremium||0, extRetail: it.extRetail,
      model:'', vendor:'', category:'', condition:'',
      status: 'in_stock', allocatedCost: 0, salePrice: null, saleDate: null,
      saleFees: 0, shippingOut: 0, notes: it.note||''
    });
  });
  allocateLotCosts(lot.id);
  save(); closeModal(); render();
  toast('Saved lot with ' + items.length + ' items', 'good');
}

function findOrphanLotByLotIds(lotIds) {
  // Find a lot that has no items but matches one of these lot IDs
  return state.lots.find(l => {
    const lotItems = state.items.filter(i => i.lotId === l.id);
    if (lotItems.length > 0) return false;
    return lotIds.some(id => (l.notes||'').includes(id) || (l.description||'').includes(id) || (l.orderNumber||'').includes(id));
  });
}

function findManifestOnlyLot(lotIds) {
  // Find a lot that has items (from manifest) but no invoice details (subtotal=0, total=0)
  return state.lots.find(l => {
    if (l.source !== 'B-Stock') return false;
    if (Number(l.total) > 0) return false;
    return lotIds.some(id => (l.notes||'').includes(id) || (l.description||'').includes(id));
  });
}

function importBStockInvoice(inv, filename) {
  // Try to attach to an existing manifest-only lot
  let lot = findManifestOnlyLot(inv.lotIds);
  if (!lot) {
    lot = {
      id: uid(),
      source: 'B-Stock',
      orderNumber: inv.orderNumber || '',
      date: inv.date || new Date().toISOString().slice(0,10),
      subtotal: inv.subtotal || 0,
      fees: inv.fees || 0,
      shipping: inv.shipping || 0,
      tax: inv.tax || 0,
      total: inv.total || 0,
      description: inv.description || '',
      origin: inv.origin || '',
      notes: 'Lot IDs: ' + inv.lotIds.join(', ') + ' · From: ' + filename,
      raw: null
    };
    state.lots.push(lot);
  } else {
    lot.orderNumber = inv.orderNumber || lot.orderNumber;
    lot.date = inv.date || lot.date;
    lot.subtotal = inv.subtotal || 0;
    lot.fees = inv.fees || 0;
    lot.shipping = inv.shipping || 0;
    lot.tax = inv.tax || 0;
    lot.total = inv.total || 0;
    lot.description = inv.description || lot.description;
    lot.origin = inv.origin || lot.origin;
    lot.notes = (lot.notes ? lot.notes + ' · ' : '') + 'Invoice: ' + filename;
  }
  allocateLotCosts(lot.id);
  save(); render();
  toast('Imported B-Stock invoice ' + (inv.orderNumber||''), 'good');
}

function importBStockManifest(parsed, filename) {
  // Try to find an existing invoice-only lot for the same Lot ID
  let lot = findOrphanLotByLotIds(parsed.lotIds);
  if (!lot) {
    lot = {
      id: uid(),
      source: 'B-Stock',
      orderNumber: '',
      date: new Date().toISOString().slice(0,10),
      subtotal: 0, fees: 0, shipping: 0, tax: 0, total: 0,
      description: 'Manifest pending invoice',
      origin: '',
      notes: 'Lot IDs: ' + parsed.lotIds.join(', ') + ' · From: ' + filename,
      raw: null
    };
    state.lots.push(lot);
  } else {
    lot.notes = (lot.notes||'') + ' · Manifest: ' + filename;
  }
  parsed.items.forEach(it => {
    state.items.push({
      id: uid(),
      lotId: lot.id,
      sku: it.itemNumber,
      itemNumber: it.itemNumber,
      description: it.description,
      qty: it.qty,
      unitRetail: it.unitRetail,
      extRetail: it.extRetail,
      model: it.model,
      vendor: it.vendor,
      category: it.category,
      condition: it.condition,
      status: 'in_stock',
      allocatedCost: 0,
      salePrice: null,
      saleDate: null,
      saleFees: 0,
      shippingOut: 0,
      notes: ''
    });
  });
  allocateLotCosts(lot.id);
  save(); render();
  toast('Imported manifest with ' + parsed.items.length + ' items', 'good');
}

function importTriangleReceipt(rec, filename) {
  const noteParts = ['From: ' + filename];
  if (rec.taxRate) noteParts.push(`Tax rate ${(rec.taxRate*100).toFixed(2)}%`);
  if (rec.cardFeeRate) noteParts.push(`Card fee ${(rec.cardFeeRate*100).toFixed(2)}%`);
  const lot = {
    id: uid(),
    source: 'Triangle',
    orderNumber: rec.orderNumber || '',
    date: rec.date || new Date().toISOString().slice(0,10),
    subtotal: rec.subtotal || 0,
    fees: rec.fees || 0,
    shipping: 0,
    tax: rec.tax || 0,
    total: rec.total || 0,
    description: 'Triangle Liquidators receipt',
    origin: 'Triangle Liquidators (RDU)',
    notes: noteParts.join(' · '),
    raw: null
  };
  state.lots.push(lot);
  rec.items.forEach(it => {
    // After collapseBuyerPremium, BP01 lines are merged into items as buyerPremium
    const desc = it.note && it.note.trim() ? it.note.trim() : `SKU ${it.sku}`;
    state.items.push({
      id: uid(),
      lotId: lot.id,
      sku: it.sku,
      itemNumber: it.sku,
      description: desc,
      qty: it.qty,
      unitRetail: it.unit,
      buyerPremium: it.buyerPremium || 0,
      extRetail: it.extRetail || it.ext,   // includes BP for allocation
      model: '',
      vendor: '',
      category: '',
      condition: '',
      status: 'in_stock',
      allocatedCost: 0,
      salePrice: null,
      saleDate: null,
      saleFees: 0,
      shippingOut: 0,
      notes: it.note || ''
    });
  });
  allocateLotCosts(lot.id);
  save(); render();
  toast('Imported Triangle receipt with ' + rec.items.length + ' items', 'good');
}

/* ============================================================
   COMPUTED METRICS
   ============================================================ */
function itemProfit(it) {
  if (it.status !== 'sold' || it.salePrice == null) return null;
  return Number(it.salePrice) - Number(it.allocatedCost||0) - Number(it.saleFees||0) - Number(it.shippingOut||0);
}
function itemROI(it) {
  const cost = Number(it.allocatedCost||0);
  if (!cost) return null;
  const p = itemProfit(it);
  if (p == null) return null;
  return p / cost;
}

function lotMetrics(lot) {
  const items = state.items.filter(i => i.lotId === lot.id);
  const totalCost = Number(lot.total) || 0;
  const sold = items.filter(i => i.status === 'sold');
  const stock = items.filter(i => i.status !== 'sold');
  const revenue = sold.reduce((s,i) => s + (Number(i.salePrice)||0), 0);
  const fees = sold.reduce((s,i) => s + (Number(i.saleFees)||0) + (Number(i.shippingOut)||0), 0);
  const soldCost = sold.reduce((s,i) => s + (Number(i.allocatedCost)||0), 0);
  const profit = revenue - soldCost - fees;
  const stockCost = stock.reduce((s,i) => s + (Number(i.allocatedCost)||0), 0);
  const roi = totalCost ? (profit / totalCost) : null;
  const realizedRoi = soldCost ? (profit / soldCost) : null;
  const sellThrough = items.length ? (sold.length / items.length) : 0;
  const totalRetail = items.reduce((s,i) => s + (Number(i.extRetail)||0), 0);
  return { items, sold, stock, revenue, fees, soldCost, profit, stockCost, roi, realizedRoi, sellThrough, totalRetail, totalCost };
}

function globalMetrics() {
  let totalSpent = state.lots.reduce((s,l) => s + (Number(l.total)||0), 0);
  let revenue = 0, fees = 0, soldCost = 0, soldUnits = 0, stockUnits = 0, listedUnits = 0, stockCost = 0;
  state.items.forEach(it => {
    if (it.status === 'sold') {
      revenue += Number(it.salePrice)||0;
      fees += (Number(it.saleFees)||0) + (Number(it.shippingOut)||0);
      soldCost += Number(it.allocatedCost)||0;
      soldUnits += Number(it.qty)||1;
    } else {
      stockCost += Number(it.allocatedCost)||0;
      if (it.status === 'listed') listedUnits += Number(it.qty)||1;
      else stockUnits += Number(it.qty)||1;
    }
  });
  const profit = revenue - soldCost - fees;
  const realizedRoi = soldCost ? profit / soldCost : null;
  const overallRoi = totalSpent ? (profit) / totalSpent : null;
  const margin = revenue ? profit / revenue : null;
  return { totalSpent, revenue, profit, fees, soldCost, stockCost, realizedRoi, overallRoi, margin, soldUnits, stockUnits, listedUnits };
}

    </div>
  `).join('');
}

function navigate(id) {
  state.ui.route = id;
  state.ui.selectedLot = null;
  render();
}

function render() {
  renderNav();
  const r = ROUTES.find(x => x.id === state.ui.route) || ROUTES[0];
  document.getElementById('pageTitle').textContent = r.label;
  document.getElementById('pageSub').textContent = r.sub;
  const page = document.getElementById('page');
  switch (state.ui.route) {
    case 'dashboard': renderDashboard(page); break;
    case 'lots':      renderLots(page); break;
    case 'inventory': renderInventory(page); break;
    case 'sales':     renderSales(page); break;
    case 'import':    renderImport(page); break;
    case 'settings':  renderSettings(page); break;
  }
  updateStorageInfo();
}

function invStatusRow(label, value, color, total) {
  const pct = total ? (value/total)*100 : 0;
  return `
    <div>
      <div class="flex justify-between text-sm mb-1"><span>${label}</span><span class="font-semibold">${value}</span></div>
      <div class="progress"><div style="width:${pct}%; background:${color};"></div></div>
    </div>
  `;
}

let _lotChart = null;
function drawLotChart(lotRows) {
  const wrap = document.getElementById('lotChartWrap');
  const ctx = document.getElementById('lotChart');
  if (!ctx || !wrap) return;
  if (_lotChart) { _lotChart.destroy(); _lotChart = null; }

  // Horizontal bars: easier to read long lot names, scales nicely with many lots
  // Allocate ~70px per lot, with a minimum height
  const rowH = 70;
  const minH = 240;
  wrap.style.height = Math.max(minH, lotRows.length * rowH + 60) + 'px';

  const labels = lotRows.map(r => {
    const t = r.lot.orderNumber || r.lot.description || 'Lot';
    return t.length > 28 ? t.slice(0,28) + '…' : t;
  });
  const cost = lotRows.map(r => +(r.m.totalCost||0).toFixed(2));
  const revenue = lotRows.map(r => +(r.m.revenue||0).toFixed(2));
  const profit = lotRows.map(r => +(r.m.profit||0).toFixed(2));

  const money = v => '$' + Number(v).toLocaleString('en-US', { minimumFractionDigits:2, maximumFractionDigits:2 });

  _lotChart = new Chart(ctx, {
    type: 'bar',
    data: { labels, datasets: [
      { label: 'Cost',    data: cost,    backgroundColor: 'rgba(148,163,184,.55)', borderRadius:6, borderSkipped:false },
      { label: 'Revenue', data: revenue, backgroundColor: 'rgba(34,211,238,.65)',  borderRadius:6, borderSkipped:false },
      { label: 'Profit',  data: profit,  backgroundColor: profit.map(v => v>=0?'rgba(16,185,129,.85)':'rgba(239,68,68,.85)'), borderRadius:6, borderSkipped:false }
    ]},
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      layout: { padding: { top: 4, right: 12, bottom: 4, left: 0 } },
      plugins: {
        legend: { position: 'bottom', labels: { color:'#cbd5e1', boxWidth:10, boxHeight:10, padding:14, font:{ size:11 } } },
        tooltip: {
          backgroundColor: '#11172b', titleColor:'#e6ebff', bodyColor:'#e6ebff',
          borderColor:'#232c4d', borderWidth:1, padding:10, cornerRadius:8,
          callbacks: { label: ctx => `${ctx.dataset.label}: ${money(ctx.parsed.x)}` }
        }
      },
      scales: {
        x: {
          beginAtZero: true,
          ticks: { color:'#8a93b8', font:{ size:11 }, callback: v => '$' + (Math.abs(v) >= 1000 ? (v/1000).toFixed(1)+'k' : v) },
          grid: { color: 'rgba(255,255,255,.05)', drawBorder: false }
        },
        y: {
          ticks: { color:'#cbd5e1', font:{ size:12 } },
          grid: { display:false, drawBorder:false }
        }
      },
      datasets: { bar: { categoryPercentage: 0.78, barPercentage: 0.85 } }
    }
  });
}

function itemRow(it) {
  const profit = itemProfit(it);
  const profitText = profit==null ? '—' : fmt.money(profit);
  const profitClass = profit==null ? 'text-muted' : (profit>=0?'text-good':'text-bad');
  const bp = Number(it.buyerPremium)||0;
  const retailHtml = bp > 0
    ? `${fmt.money(it.extRetail)} <span class="text-[10px] text-muted block">$${(it.extRetail-bp).toFixed(2)} + $${bp.toFixed(2)} BP</span>`
    : fmt.money(it.extRetail);
  return `
    <tr>
      <td>
        <div class="font-medium">${escapeHtml(it.description||'(no description)')}</div>
        ${it.condition?`<div class="text-xs text-muted">${escapeHtml(it.condition)}</div>`:''}
      </td>
      <td class="text-xs text-muted">${escapeHtml(it.sku||it.itemNumber||'')}</td>
      <td class="text-right">${it.qty||1}</td>
      <td class="text-right">${retailHtml}</td>
      <td class="text-right font-medium">${fmt.money(it.allocatedCost)}</td>
      <td><span class="pill pill-${it.status==='sold'?'sold':it.status==='listed'?'listed':'stock'}">${(it.status||'in_stock').replace('_',' ')}</span></td>
      <td class="text-right">${it.salePrice==null?'—':fmt.money(it.salePrice)}${it.status==='sold'&&it.paymentMethod?`<div class="text-[10px] text-muted">${escapeHtml(paymentMethodLabel(it.paymentMethod))}</div>`:''}</td>
      <td class="text-right ${profitClass} font-semibold">${profitText}</td>
      <td class="text-right">
        <button class="btn btn-ghost text-xs py-1" onclick="openEditItemModal('${it.id}')">Edit</button>
        ${it.status!=='sold'?`<button class="btn btn-primary text-xs py-1" onclick="openSellModal('${it.id}')">Sell</button>`:''}
      </td>
    </tr>
  `;
}

function renderInventory(page) {
  const filter = state.ui.filter || 'all';
  let items = state.items.slice();
  if (filter === 'in_stock') items = items.filter(i => i.status === 'in_stock');
  else if (filter === 'listed') items = items.filter(i => i.status === 'listed');
  else if (filter === 'sold') items = items.filter(i => i.status === 'sold');
  else if (filter === 'available') items = items.filter(i => i.status !== 'sold');
  items.sort((a,b) => (Number(b.allocatedCost)||0) - (Number(a.allocatedCost)||0));

  const tabs = [
    { id:'all', label:'All', count: state.items.length },
    { id:'available', label:'Available', count: state.items.filter(i=>i.status!=='sold').length },
    { id:'in_stock', label:'In stock', count: state.items.filter(i=>i.status==='in_stock').length },
    { id:'listed', label:'Listed', count: state.items.filter(i=>i.status==='listed').length },
    { id:'sold', label:'Sold', count: state.items.filter(i=>i.status==='sold').length }

              <div class="font-medium">${escapeHtml(it.description||'(no description)')}</div>

function renderSales(page) {
  const sold = state.items.filter(i => i.status === 'sold')

  const totalRevenue = sold.reduce((s,i) => s + (Number(i.salePrice)||0), 0);
  const totalCost = sold.reduce((s,i) => s + (Number(i.allocatedCost)||0), 0);
  const totalFees = sold.reduce((s,i) => s + (Number(i.saleFees)||0) + (Number(i.shippingOut)||0), 0);
  const totalProfit = totalRevenue - totalCost - totalFees;

  page.innerHTML = `
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
      <div class="stat-card"><div class="text-xs text-muted uppercase mb-1">Sales</div><div class="text-2xl font-bold">${sold.length}</div></div>
      <div class="stat-card"><div class="text-xs text-muted uppercase mb-1">Revenue</div><div class="text-2xl font-bold">${fmt.money(totalRevenue)}</div></div>
      <div class="stat-card"><div class="text-xs text-muted uppercase mb-1">Fees + Shipping</div><div class="text-2xl font-bold">${fmt.money(totalFees)}</div></div>
      <div class="stat-card"><div class="text-xs text-muted uppercase mb-1">Net Profit</div><div class="text-2xl font-bold ${totalProfit>=0?'text-good':'text-bad'}">${fmt.money(totalProfit)}</div></div>
    </div>
    ${sold.length===0 ? emptyState('No sales yet','Mark items as sold from Inventory or Lots.') :
    `<div class="panel rounded-xl overflow-hidden">
      <table class="data">
        <thead><tr>
          <th>Date</th><th>Item</th><th>Payment</th><th class="text-right">Sale</th>
          <th class="text-right">Cost</th><th class="text-right">Fees</th>
          <th class="text-right">Profit</th><th class="text-right">ROI</th><th></th>
        </tr></thead>
        <tbody>${sold.map(it => {
          const profit = itemProfit(it);
          const roi = itemROI(it);
          return `<tr>
            <td class="text-muted">${fmt.date(it.saleDate)}</td>
            <td><div class="font-medium">${escapeHtml(it.description||'')}</div></td>
            <td><span class="pill pill-pay">${escapeHtml(paymentMethodLabel(it.paymentMethod))}</span></td>
            <td class="text-right">${fmt.money(it.salePrice)}</td>
            <td class="text-right">${fmt.money(it.allocatedCost)}</td>
            <td class="text-right">${fmt.money((Number(it.saleFees)||0)+(Number(it.shippingOut)||0))}</td>
            <td class="text-right ${profit>=0?'text-good':'text-bad'} font-semibold">${fmt.money(profit)}</td>
            <td class="text-right ${(roi||0)>=0?'text-good':'text-bad'}">${roi==null?'—':fmt.pct(roi)}</td>
            <td class="text-right"><button class="btn btn-ghost text-xs py-1" onclick="openEditItemModal('${it.id}')">Edit</button></td>
          </tr>`;
        }).join('')}</tbody>
      </table>
    </div>
    ${renderPaymentBreakdown(sold)}`}
  `;
}

function renderPaymentBreakdown(sold) {
  if (!sold.length) return '';
  const buckets = {};
  for (const it of sold) {
    const key = it.paymentMethod || '';
    if (!buckets[key]) buckets[key] = { count: 0, revenue: 0, profit: 0 };
    buckets[key].count++;
    buckets[key].revenue += Number(it.salePrice)||0;
    buckets[key].profit += itemProfit(it) || 0;
  }
  const rows = PAYMENT_METHODS
    .filter(m => buckets[m.id])
    .map(m => {
      const b = buckets[m.id];
      return `<tr>
        <td><span class="pill pill-pay">${escapeHtml(m.label)}</span></td>
        <td class="text-right">${b.count}</td>
        <td class="text-right">${fmt.money(b.revenue)}</td>
        <td class="text-right ${b.profit>=0?'text-good':'text-bad'} font-semibold">${fmt.money(b.profit)}</td>
      </tr>`;
    }).join('');
  return `
    <div class="mt-6 panel rounded-xl overflow-hidden">
      <div class="px-5 py-3 border-b border-white/5">
        <h3 class="font-semibold">Revenue by payment method</h3>
      </div>
      <table class="data">
        <thead><tr><th>Method</th><th class="text-right">Sales</th><th class="text-right">Revenue</th><th class="text-right">Profit</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

      </div>

      <h3 class="font-semibold mb-2">How allocation works</h3>
      <p class="text-sm text-muted">Total lot cost (subtotal + fees + shipping + tax) is split proportionally across items based on each item's extended retail value. For Triangle receipts, each item's "retail" includes its 15% buyer's premium, then NC sales tax is allocated proportionally.</p>
    </div>
  `;

  const dz = document.getElementById('dropzone');
  ['dragover','dragenter'].forEach(ev => dz.addEventListener(ev, e => { e.preventDefault(); dz.classList.add('drag'); }));
  ['dragleave','drop'].forEach(ev => dz.addEventListener(ev, e => { e.preventDefault(); dz.classList.remove('drag'); }));
  dz.addEventListener('drop', async (e) => {
    const files = [...(e.dataTransfer?.files || [])];
    for (const f of files) await handleFile(f);
  });
}
function onFileInput(e) {
  const files = [...e.target.files];
  (async () => { for (const f of files) await handleFile(f); e.target.value=''; })();
}

function renderSettings(page) {
  page.innerHTML = `
    <div class="panel rounded-xl p-6 mb-5">

      <p class="text-sm text-muted mb-4">Your data lives in your browser. Export a JSON file to back up or move between devices.</p>
      <div class="flex gap-2 flex-wrap">
        <button class="btn btn-primary" onclick="exportData()">Export JSON</button>
        <label class="btn btn-ghost cursor-pointer">
          Import JSON
          <input type="file" accept=".json" class="hidden" onchange="importData(event)">
        </label>
        <button class="btn btn-danger" onclick="confirmReset()">Reset all data</button>
      </div>
    </div>
    <div class="panel rounded-xl p-6">
      <h3 class="font-semibold text-lg mb-3">Recompute</h3>
      <p class="text-sm text-muted mb-4">Re-run proportional cost allocation across all lots (use after editing a lot's totals).</p>

function exportData() {
  const data = { lots: state.lots, items: state.items, exportedAt: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `liquidation-tracker-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('Exported', 'good');
}
function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      state.lots = data.lots || [];
      state.items = data.items || [];
      save(); render();
      toast('Imported ' + state.lots.length + ' lots, ' + state.items.length + ' items', 'good');
    } catch(err) { toast('Invalid JSON: ' + err.message, 'bad'); }
  };
  reader.readAsText(file);
}
function confirmReset() {
  modal(`
    <div class="p-6">
      <h3 class="text-lg font-bold mb-2">Reset all data?</h3>
      <p class="text-muted text-sm mb-5">This will delete all lots, items, and sales. Cannot be undone (export first if needed).</p>

}
